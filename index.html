<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ian & Ellie Celebration</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff6f0, #f0f8ff);
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 25px;
}

.header {
    text-align: center;
    padding: 30px 10px;
}

.header h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.header p {
    color: #555;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    margin-top: 20px;
}

.section-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #333;
}

.info {
    line-height: 1.6;
    color: #444;
}

.rsvp input,
.rsvp select,
.rsvp textarea {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #ff6b6b;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff4f4f;
}

.success {
    display: none;
    margin-top: 15px;
    color: green;
    text-align: center;
}

</style>
</head>

<body>
    <audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>
    <button onclick="document.getElementById('bgMusic').play()" 
style="
position:fixed;
bottom:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#ff6b6b;
color:white;
cursor:pointer;
">
▶ Play Music
</button>

<div class="container">

    <div class="header">
        <h1>🎉 Ian Turns 5 & 👶 Ellie’s Christening</h1>
        <p>You are warmly invited to celebrate this special day with us</p>
    </div>

    <div class="card">
        <div class="section-title">📅 Event Details</div>
        <div class="info">
            <p><b>Date:</b> [Insert Date]</p>
            <p><b>Time:</b> [Insert Time]</p>
            <p><b>Venue:</b> [Insert Location]</p>
        </div>
    </div>

    <div class="card rsvp">
        <div class="section-title">📩 RSVP</div>

        <form id="rsvpForm">

            <input type="text" id="name" placeholder="Full Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <select id="attendance" required>
                <option value="">Will you attend?</option>
                <option value="Yes">Yes, we will attend</option>
                <option value="No">Sorry, we can’t attend</option>
            </select>

            <input type="number" id="guests" placeholder="Number of Guests" min="0" max="10">

            <textarea id="message" placeholder="Message (optional)"></textarea>

            <button type="submit">Send RSVP</button>

        </form>

        <div class="success" id="successMsg">
            Thank you! Your RSVP has been recorded 💛
        </div>
    </div>

</div>

<script>

// 🔴 PASTE YOUR GOOGLE APPS SCRIPT URL HERE
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBkDnHbTgr3MJG8pOxzJ0P9JL6dgTmL65dhY7gzJBknUTz8Ice3_p5PWIPRhkhJl8a/exec";

document.getElementById("rsvpForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        attendance: document.getElementById("attendance").value,
        guests: document.getElementById("guests").value,
        message: document.getElementById("message").value
    };

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data)
        });

        document.getElementById("rsvpForm").reset();
        document.getElementById("successMsg").style.display = "block";

    } catch (err) {
        alert("Something went wrong. Please try again.");
    }
});
</script>

</body>
</html>
