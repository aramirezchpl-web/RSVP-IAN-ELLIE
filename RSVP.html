<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAN'S 5th BIRTHDAY & ELLIE'S CHRISTENING CELEBRATION</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.event-info{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#0066ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.success{
    display:none;
    margin-top:20px;
    padding:15px;
    background:#e8f8ec;
    color:#0a7d32;
    border-radius:6px;
    text-align:center;
}

.error{
    display:none;
    margin-top:20px;
    padding:15px;
    background:#ffe8e8;
    color:#b30000;
    border-radius:6px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <h1>You're Invited!</h1>

    <div class="event-info">
        <p><strong>IAN'S BIRTHDAY & ELLIE'S CHRISTENING</strong></p>
        <p>JUNE 21, 2026 @ 2pm</p>
        <p>OUAN'S FARM RESORT</p>
    </div>

    <form id="rsvpForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Attendance</label>
            <select id="attendance" required>
                <option value="">Select</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>
        </div>

        <div class="form-group">
            <label>Number of Guests</label>
            <input type="number" id="guests" value="0" min="0" max="10">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="4"></textarea>
        </div>

        <button type="submit" id="submitBtn">
            Submit RSVP
        </button>

    </form>

    <div class="success" id="successMessage">
        Thank you! Your RSVP has been received.
    </div>

    <div class="error" id="errorMessage">
        Unable to submit RSVP. Please try again.
    </div>

</div>

<script>

// PASTE YOUR APPS SCRIPT URL HERE
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzBkDnHbTgr3MJG8pOxzJ0P9JL6dgTmL65dhY7gzJBknUTz8Ice3_p5PWIPRhkhJl8a/exec";

document.getElementById("rsvpForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    document.getElementById("successMessage").style.display = "none";
    document.getElementById("errorMessage").style.display = "none";

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        attendance: document.getElementById("attendance").value,
        guests: document.getElementById("guests").value,
        message: document.getElementById("message").value
    };

    try {

        await fetch(SCRIPT_URL,{
            method:"POST",
            mode:"no-cors",
            body:JSON.stringify(data)
        });

        document.getElementById("rsvpForm").reset();

        document.getElementById("successMessage").style.display = "block";

    } catch(err){

        document.getElementById("errorMessage").style.display = "block";
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit RSVP";
});

</script>

</body>
</html>
